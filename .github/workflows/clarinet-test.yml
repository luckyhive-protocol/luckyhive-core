name: Clarinet Test Coverage

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run Clarinet Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Clarinet
        uses: hirosystems/setup-clarinet@v1
        with:
          version: "2.0.0" # Adjust based on the targeted Stacks node release

      - name: Verify Clarinet Installation
        run: clarinet --version

      - name: Code Syntax and Logic Check
        run: clarinet check

      - name: Run Clarinet Tests with Coverage
        run: clarinet test --coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: clarinet-coverage
          path: coverage/
