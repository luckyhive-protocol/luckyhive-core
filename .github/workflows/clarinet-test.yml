name: Clarinet Test Coverage

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run Clarinet Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Clarinet
        run: |
          curl -L https://github.com/hirosystems/clarinet/releases/download/v2.9.0/clarinet-linux-x64-glibc.tar.gz | tar xz
          chmod +x clarinet
          sudo mv clarinet /usr/local/bin/

      - name: Verify Clarinet Installation
        run: clarinet --version

      - name: Code Syntax and Logic Check
        run: clarinet check

      - name: Run Clarinet Tests
        run: clarinet test

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clarinet-coverage
          path: coverage/
