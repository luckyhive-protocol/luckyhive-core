name: Frontend Build & Lint CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    paths:
      - "frontend/**"

jobs:
  build:
    name: Build and Lint Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@v4
        with:
          repository: luckyhive-protocol/luckyhive-frontend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Production Build Verification
        run: npm run build
