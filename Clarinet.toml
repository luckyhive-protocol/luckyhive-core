[project]
name = "luckyhive"
description = "Decentralized no-loss prize savings protocol on Stacks"
authors = []
telemetry = false
cache_dir = "./.cache"

[[project.requirements]]
contract_id = "SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard"

[contracts.honeycomb-token]
path = "contracts/honeycomb-token.clar"
clarity_version = 3
epoch = 3.0

[contracts.twab-controller]
path = "contracts/twab-controller.clar"
clarity_version = 3
epoch = 3.0

[contracts.prize-pool]
path = "contracts/prize-pool.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["honeycomb-token", "twab-controller"]

[contracts.vault-factory]
path = "contracts/vault-factory.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["prize-pool"]

[contracts.auction-manager]
path = "contracts/auction-manager.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["prize-pool"]

[contracts.governance]
path = "contracts/governance.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["prize-pool"]

[contracts.auth-provider]
path = "contracts/auth-provider.clar"
clarity_version = 3
epoch = 3.0
