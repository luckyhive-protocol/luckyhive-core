[project]
name = "luckyhive"
description = "Decentralized no-loss prize savings protocol on Stacks"
authors = []
telemetry = false
cache_dir = "./.cache"

[[project.requirements]]
contract_id = "SP3FBR2AGK5H9QBDH3EEN6DF8EK8JY7RX8QJ5SVTE.sip-010-trait-ft-standard"

[contracts.luckyhive-honeycomb]
path = "contracts/luckyhive-honeycomb.clar"
clarity_version = 3
epoch = 3.0

[contracts.luckyhive-twab-controller]
path = "contracts/luckyhive-twab-controller.clar"
clarity_version = 3
epoch = 3.0

[contracts.luckyhive-prize-pool]
path = "contracts/luckyhive-prize-pool.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["luckyhive-honeycomb", "luckyhive-twab-controller"]

[contracts.luckyhive-vault]
path = "contracts/luckyhive-vault.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["luckyhive-prize-pool"]

[contracts.luckyhive-auction-manager]
path = "contracts/luckyhive-auction-manager.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["luckyhive-prize-pool"]

[contracts.luckyhive-governance]
path = "contracts/luckyhive-governance.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["luckyhive-prize-pool"]

[contracts.luckyhive-auth-provider]
path = "contracts/luckyhive-auth-provider.clar"
clarity_version = 3
epoch = 3.0
